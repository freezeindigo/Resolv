# --- TIER 3 ---
# Any of these signals escalates to Tier 3 regardless of domain.

# Keywords that indicate recurrence / prior failure — strongest Tier 3 signal
recurrence_phrases:
  - "again"
  - "still not"
  - "still facing"
  - "still pending"
  - "not resolved"
  - "unresolved"
  - "repeated"
  - "repeatedly"
  - "third time"
  - "4th time"
  - "multiple times"
  - "same issue"
  - "same problem"
  - "same complaint"
  - "previously complained"
  - "already complained"
  - "already raised"
  - "despite"
  - "no action"
  - "no response"
  - "ignored"
  - "escalat"

# Keywords that indicate multi-domain ambiguity — requires hypothesis agents
ambiguity_keywords:
  - "seepage"
  - "seep"
  - "damp"
  - "wet wall"
  - "wet ceiling"
  - "ceiling leak"
  - "ceiling water"
  - "wall crack"
  - "crack and leak"
  - "algae"
  - "moss"

# Domains that are always Tier 3 — cost-of-error too high for single agent
tier3_domains:
  - "structural_civil"
  - "safety_security"
  - "lift_elevator"

# Safety keywords — always Tier 3 regardless of domain classification
safety_keywords:
  - "spark"
  - "sparking"
  - "shock"
  - "electric shock"
  - "smoke"
  - "fire alarm"
  - "burning smell"
  - "gas leak"
