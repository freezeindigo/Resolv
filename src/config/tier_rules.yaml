# Tier classification rules
# Tier 1: deterministic, high-confidence patterns grounded in top sample complaint titles
# Tier 2: default — single reasoning agent
# Tier 3: ambiguity / recurrence / safety / high-cost domains

tier1_min_domain_confidence: 0.55

tier1_patterns:
  water_plumbing:
    - "flush not working"
    - "plumber required"
    - "hot water not coming"
    - "solar water not coming"
    - "water wasn't avaikable"
    - "water wasnot cominng due to tank cleaning"
    - "no water in kitchen"
    - "there is no water in washroom"
    - "water pressure low"
    - "new water connection"
    - "wc base leakage"
    - "wc issue"
    - "kitchen sink leakeage issue"
    - "kitchen draineage chockup"
    - "jet spray leakeage"
    - "jet spray changing required"
    - "mbr wr nani trap chockup"
    - "chokup issue"
    - "shower not working in common bathroom"
    - "re:(^|\\b)tap issue(\\b|$)"

  electrical:
