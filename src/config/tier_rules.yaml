# Tier classification rules
# Tier 1: unambiguous, rule-route, no LLM
# Tier 2: default — single reasoning agent
# Tier 3: ambiguous, high-cost, or recurrence signal — multi-agent deliberation

# --- TIER 1 ---
# Exact or near-exact patterns from top complaint titles in Godrej data.
# Must be unambiguous: single domain, clear action, low cost-of-error.
# Matched case-insensitively against complaint_title.

