# Hypothesis Library — domain to hypothesis agent mappings
# trigger_conditions gate which agents run before Tier 3 LLM calls.

water_plumbing:
  description: "Plumbing leaks, drainage, water supply, seepage"
  hypothesis_types:
    - id: pipe_failure
      name: "Pipe / Fixture Failure"
      description: "Plumbing pipe leak, fixture failure, or drainage issue in this unit"
      prompt_template: "src/agents/prompts/pipe_failure.md"
      evidence_filter:
        - flat_history
        - recent_plumbing_work
      cost_of_error_weight: 1.0
      trigger_conditions:
        always_spawn_in_domain: true
        require_any:
          - tap
          - flush
          - pipe
          - drain
          - choke
          - basin
          - sink
          - geyser
          - valve
          - wc
          - jet
        boost_score: 0

    - id: structural_seepage
      name: "Structural Seepage"
      description: "Waterproofing degradation, wall/ceiling seepage, inter-unit water ingress"
      prompt_template: "src/agents/prompts/structural_seepage.md"
      evidence_filter:
        - building_seepage_history
        - adjacent_above_flat_history
        - building_pattern
        - flat_history
      cost_of_error_weight: 10.0
      trigger_conditions:
        require_any:
          - ceiling
          - wall
          - seepage
          - damp
          - moisture
        suppress:
          - tap
          - sink
          - faucet
          - flush
          - basin
        boost_score: 0
        extra_boost:
          recurrence_or_vertical_stack: 2

    - id: environmental
      name: "Environmental / External"
      description: "Weather-driven water ingress, roof drainage overflow, external sources"
      prompt_template: "src/agents/prompts/environmental.md"
      evidence_filter:
        - flat_history
        - building_pattern
      cost_of_error_weight: 2.0
      trigger_conditions:
        require_any:
          - rain
          - monsoon
          - terrace
          - roof
          - external
          - storm
          - ceiling
        suppress:
          - tap
          - pipe
          - fixture
        boost_score: 0

    - id: hvac_condensate
      name: "HVAC Condensate"
      description: "AC condensate drain failure causing ceiling drip"
      prompt_template: "src/agents/prompts/hvac_condensate.md"
      evidence_filter:
        - flat_history
        - adjacent_history
      cost_of_error_weight: 1.5
      trigger_conditions:
        require_any:
          - ceiling
          - drip
        require_context_or:
          flat_has_ac: true
          complaint_mentions_ac: true
        suppress:
          - wall
          - floor
          - tap
        boost_score: 0

electrical:
  description: "Electrical faults, power supply, switches, wiring"
  hypothesis_types:
    - id: internal_wiring
      name: "Internal Wiring / Fixture Fault"
      description: "Wiring fault, fixture failure, or circuit issue within this unit"
      prompt_template: "src/agents/prompts/internal_wiring.md"
      evidence_filter:
        - flat_history
      cost_of_error_weight: 1.0
      trigger_conditions:
        always_spawn_in_domain: true
        require_any:
          - switch
          - socket
          - wire
          - mcb
          - trip
          - short
        boost_score: 0

    - id: external_supply
      name: "External Supply Issue"
      description: "Building-level supply problem, load shedding, MSEB/DISCOM failure"
      prompt_template: "src/agents/prompts/external_supply.md"
      evidence_filter:
        - building_pattern
        - flat_history
      cost_of_error_weight: 2.0
      trigger_conditions:
        require_any:
          - power
          - no supply
          - voltage
          - load shedding
          - transformer
        suppress:
          - switch
          - socket
        boost_score: 0

    - id: equipment_specific
      name: "Equipment Failure"
      description: "Specific equipment failure: geyser, inverter, fan, intercom, VDP"
      prompt_template: "src/agents/prompts/equipment_specific.md"
      evidence_filter:
        - flat_history
      cost_of_error_weight: 0.8
      trigger_conditions:
        require_any:
          - fan
          - geyser
          - inverter
          - intercom
          - vdp
          - bell
          - exhaust
          - motor
        suppress:
          - power cut
          - no supply
        boost_score: 0

    - id: safety_hazard
      name: "Electrical Safety Hazard"
      description: "Shock risk, short circuit, sparking, fire hazard — immediate escalation"
      prompt_template: "src/agents/prompts/safety_hazard.md"
      evidence_filter:
        - flat_history
      cost_of_error_weight: 20.0
      trigger_conditions:
        never_suppress: true
        require_any:
          - spark
          - shock
          - burning
          - smell
          - smoke
          - fire
          - short circuit
        boost_score: 0

