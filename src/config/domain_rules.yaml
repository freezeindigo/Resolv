# Domain classification rules
# Matched against complaint_title (lowercased)
# phrase_matches: multi-word — scored higher (weight 3)
# keyword_matches: single word/stem — scored lower (weight 1)
# source_categories: raw category values from the data that map to this domain
#                    (used as a tiebreaker hint, not primary signal)

