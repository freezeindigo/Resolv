databases:
  - name: resolv-db
    plan: free

services:
  - type: redis
    name: resolv-redis
    ipAllowList: []

  - type: web
    name: resolv
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: resolv-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: resolv-redis
          property: connectionString
